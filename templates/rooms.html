<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let Chat 聊天室大厅</title>
<style>
body{font-family:Arial;padding:30px;background:#f5f5f5}
.room{background:white;padding:20px;margin:15px 0;border-radius:10px}
button{padding:8px 15px;cursor:pointer}
</style>
</head>
<body>
<h1>Let Chat 聊天室大厅</h1>
<button onclick="createRoom()">创建聊天室</button>
<div id="rooms"></div>

<script>
async function loadRooms(){
 const res=await fetch('/api/rooms');
 const rooms=await res.json();
 const box=document.getElementById('rooms');

 if(!rooms.length){
   box.innerHTML='<div class="room">暂无聊天室，请创建一个</div>';
   return;
 }

 box.innerHTML=rooms.map(r=>`
 <div class="room">
   <h2>${r.name}</h2>
   <p>${r.description || '暂无介绍'}</p>
   <button onclick="joinRoom(${r.id})">进入聊天室</button>
 </div>
 `).join('');
}

function joinRoom(id){
 location.href='/chat/'+id;
}

async function createRoom(){
 const name=prompt('请输入聊天室名称');
 if(!name)return;

 await fetch('/api/rooms/create',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({name})
 });

 loadRooms();
}

loadRooms();
</script>
</body>
</html>
